name = "cf-sub"
main = "src/worker.js"
compatibility_date = "2026-03-06"
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/sub/*"]

# ── KV 命名空间 ──────────────────────────────
# 部署前请先在 Cloudflare 控制台创建 KV 命名空间，
# 然后将 id 填入下方（本地开发用 preview_id 自动创建）
[[kv_namespaces]]
binding = "SUB_STORE"
id = "59ca7f553aa54b359621ab676ce410e1"
# preview_id = "你的预览KV命名空间ID"

# ── 环境变量（可选）─────────────────────────────
# 在 Cloudflare 控制台 → Workers → 设置 → 变量 中配置：
# SUB_ACCESS_TOKEN    = "你的订阅访问令牌"
# GOOGLE_ADS_CLIENT   = "ca-pub-xxxxxxxxxxxxxxxx"
# GOOGLE_ADS_SLOT     = "xxxxxxxxxx"
# SITE_TITLE          = "自定义站点标题"
# SITE_DESCRIPTION    = "自定义站点描述"
